<title>Hotel Xalia</title>
<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:tahoma;}
/* VIP BACKGROUND */
body{
  background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),url("hotel-bg.jpg") center/cover fixed;
  color:white;
}
/* NAV */
nav{position:sticky;top:0;background:rgba(179,0,0,.9);padding:18px;display:flex;justify-content:center;gap:40px;}
nav a{color:white;text-decoration:none;font-size:18px;font-weight:bold;}
/* SECTION */
section{padding:60px 20px;text-align:center;}
/* ROOMS */
.rooms{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;max-width:700px;margin:auto;}
.rooms a{background:white;color:#333;padding:18px;border-radius:15px;text-decoration:none;font-weight:bold;}
/* LIGHTBOX */
.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);opacity:0;pointer-events:none;display:flex;justify-content:center;align-items:center;}
.lightbox:target{opacity:1;pointer-events:auto;}
/* CARD */
.card{background:white;color:#222;width:95%;max-width:520px;border-radius:20px;overflow:hidden;position:relative;}
/* SLIDER */
.slider{display:flex;overflow-x:auto;gap:10px;padding:12px;}
.slider img{height:220px;border-radius:12px;}
/* CONTENT */
.content{padding:20px;direction:rtl;text-align:right;}
/* LANG BUTTONS */
.lang button{margin:5px;padding:8px 12px;border:none;border-radius:10px;background:#444;color:white;cursor:pointer;}
/* RESERVE */
.reserve{background:#25D366;color:white;border:none;width:100%;padding:16px;font-size:18px;border-radius:12px;margin-top:15px;cursor:pointer;}
/* CLOSE */
.close{position:absolute;top:20px;right:30px;font-size:45px;color:white;text-decoration:none;}
</style>

const WA_NUMBER = "905464658083";
const defaultLang = "fa";
const roomLangState = {};

function el(id){ return document.getElementById(id); }

function initRoom(roomNumber, dataObj){
  const boxEl = el(`box-${roomNumber}`);
  const titleEl = el(`title-${roomNumber}`);
  const descEl = el(`desc-${roomNumber}`);
  const reserveBtnEl = el(`reserve-${roomNumber}`);

  if(!boxEl || !titleEl || !descEl || !reserveBtnEl) return;

  roomLangState[roomNumber] = defaultLang;

  function setLang(l){
    const langData = dataObj[l] || dataObj[defaultLang];
    roomLangState[roomNumber] = l;
    boxEl.style.direction = langData.dir || "rtl";
    boxEl.style.textAlign = (langData.dir === "rtl") ? "right" : "left";
    titleEl.innerHTML = langData.title || "";
    descEl.innerHTML = langData.desc || "";
    reserveBtnEl.innerText = langData.btn || "";
  }

  function reserveRoom(){
    const current = roomLangState[roomNumber] || defaultLang;
    const langData = dataObj[current] || dataObj[defaultLang];
    const waText = langData.waText || langData.title || `Reserve Room ${roomNumber}`;
    window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(waText)}`, "_blank");
  }

  // Expose required global functions
  const setName = `setLang${roomNumber}`;
  const reserveName = `reserveRoom${roomNumber}`;

  if(typeof window[setName] !== "function"){
    window[setName] = setLang;
  } else {
    // wrap existing
    const prev = window[setName];
    window[setName] = function(lang){ setLang(lang); try{ prev(lang); }catch(e){} };
  }

  if(typeof window[reserveName] !== "function"){
    window[reserveName] = reserveRoom;
  } else {
    const prevR = window[reserveName];
    window[reserveName] = function(){ reserveRoom(); try{ prevR(); }catch(e){} };
  }

  // Attach language buttons
  document.querySelectorAll(`button[data-room="${roomNumber}"]`).forEach(btn=>{
    btn.addEventListener("click", function(){ setLang(this.dataset.lang); });
  });

  // Attach reserve button
  reserveBtnEl.addEventListener("click", reserveRoom);

  // Initialize default language
  setLang(defaultLang);
}

/* Initialize all rooms present in roomsData */
Object.keys(roomsData).forEach(roomNum => {
  initRoom(roomNum, roomsData[roomNum]);
});

    if(e.target === this){
      window.location.hash = '';

});
